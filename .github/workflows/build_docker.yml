name: build and push

on:
  release:
    types:
      - published

env:
  IMAGE_REPO: ghcr.io/dev-whoan/shorttpd

jobs:
  extract_release_tag:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract_info.outputs.version }}
      date: ${{ steps.extract_info.outputs.date }}
    steps:
      - name: Extract Release Information
        id: extract_info
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          # Syntax Versioning: v1.2.3
          IFS='-' read -r VERSION <<< "$TAG_NAME"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT
          echo "Build will be triggered for application of production for version: $VERSION"

      - name: Display metadata
        run: |
          echo "version: ${{ steps.extract_info.outputs.version }}"
          echo "date: ${{ steps.extract_info.outputs.date }}"

  build-amd64:
    runs-on: ubuntu-24.04
    needs:
      - extract_release_tag
    permissions:
      id-token: write
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push AMD64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          provenance: false
          build-args: |
            VERSION=${{ needs.extract_release_tag.outputs.version }}
          tags: |
            ${{ env.IMAGE_REPO }}:${{ needs.extract_release_tag.outputs.version }}-amd64

  build-arm64:
    runs-on: ubuntu-24.04-arm
    needs:
      - extract_release_tag
    permissions:
      id-token: write
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ARM64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          provenance: false
          build-args: |
            VERSION=${{ needs.extract_release_tag.outputs.version }}
          tags: |
            ${{ env.IMAGE_REPO }}:${{ needs.extract_release_tag.outputs.version }}-arm64

  merge:
    runs-on: ubuntu-24.04
    needs:
      - build-amd64
      - build-arm64
      - extract_release_tag
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Create and push multi-arch manifest
        run: |
          docker buildx imagetools create \
            -t ${{ env.IMAGE_REPO }}:${{ needs.extract_release_tag.outputs.version }} \
            -t ${{ env.IMAGE_REPO }}:latest \
            ${{ env.IMAGE_REPO }}:${{ needs.extract_release_tag.outputs.version }}-amd64 \
            ${{ env.IMAGE_REPO }}:${{ needs.extract_release_tag.outputs.version }}-arm64
